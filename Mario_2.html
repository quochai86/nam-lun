<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Mario Bros - Ultimate Edition</title>
    <style>
        body {
            margin: 0; padding: 0; background-color: #111;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden; font-family: 'Courier New', Courier, monospace;
        }
        canvas {
            background-color: #5C94FC; 
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.9);
            image-rendering: pixelated;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // --- 1. GAME STATES ---
        const STATE = { START: 0, PLAYING: 1, GAMEOVER: 2, LEVEL_COMPLETE: 3, GAME_CLEAR: 4 };
        let currentState = STATE.START;
        
        let score = 0; let coins = 0; let currentLevel = 1; const MAX_LEVEL = 20;
        
        // Điều khiển
        const keys = { right: false, left: false, up: false, upJustPressed: false, enter: false, r: false, z: false };
        let lastFacingRight = true;

        window.addEventListener('keydown', (e) => {
            if (e.code === 'ArrowRight' || e.code === 'KeyD') { keys.right = true; lastFacingRight = true; }
            if (e.code === 'ArrowLeft' || e.code === 'KeyA') { keys.left = true; lastFacingRight = false; }
            if (e.code === 'ArrowUp' || e.code === 'KeyW' || e.code === 'Space') { 
                if (!keys.up) keys.upJustPressed = true; 
                keys.up = true; 
            }
            if (e.code === 'Enter') keys.enter = true;
            if (e.code === 'KeyR') keys.r = true;
            if (e.code === 'KeyZ' || e.code === 'ShiftLeft') { if (!keys.z) shootFireball(); keys.z = true; }
        });

        window.addEventListener('keyup', (e) => {
            if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = false;
            if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = false;
            if (e.code === 'ArrowUp' || e.code === 'KeyW' || e.code === 'Space') { keys.up = false; keys.upJustPressed = false; }
            if (e.code === 'Enter') keys.enter = false;
            if (e.code === 'KeyR') keys.r = false;
            if (e.code === 'KeyZ' || e.code === 'ShiftLeft') keys.z = false;
        });

        // --- 2. THỰC THỂ (ENTITIES) ---
        let player = {
            x: 50, y: 300, w: 24, h: 24, vx: 0, vy: 0,
            speed: 2200, maxSpeed: 350, friction: 0.82,
            jumpPower: -650, gravity: 1600, fallMultiplier: 2.5,
            isGrounded: false, power: 0, invulnTimer: 0,
            starTimer: 0, jumps: 0, maxJumps: 2
        };

        let WORLD_WIDTH = 4000;
        let cameraX = 0;
        
        let platforms = [], blocks = [], enemies = [], items = [], fireballs = [];
        let particles = [], piranhas = [], clouds = [], floatTexts = [];
        let goal = { x: 0, y: 0, w: 0, h: 0 };

        const BLOCK_TYPE = { SOLID: 0, MUSHROOM: 1, FLOWER: 2, COIN: 3, EMPTY: 4, STAR: 5 };

        // --- 3. TẠO BẢN ĐỒ NGẪU NHIÊN ---
        function buildProceduralLevel(level) {
            platforms = []; blocks = []; enemies = []; items = []; fireballs = []; 
            particles = []; piranhas = []; clouds = []; floatTexts = [];
            
            WORLD_WIDTH = 3500 + (level * 600); 
            platforms.push({ x: 0, y: 550, w: 600, h: 50 }); 
            let currentX = 600;

            while (currentX < WORLD_WIDTH - 1200) {
                let chunkType = Math.floor(Math.random() * 5); 
                let diff = 1 + (level / 10);

                if (chunkType === 0) {
                    platforms.push({ x: currentX, y: 550, w: 800, h: 50 });
                    for(let i=0; i<4; i++) {
                        blocks.push({ x: currentX + 150 + i*50, y: 380, w: 40, h: 40, type: Math.random()>0.7 ? BLOCK_TYPE.COIN : BLOCK_TYPE.SOLID, originalY: 380 });
                        enemies.push({ x: currentX + 300 + i*100, y: 500, w: 24, h: 24, vx: -50 * diff, type: 'goomba' });
                    }
                    platforms.push({ x: currentX + 650, y: 530, w: 40, h: 20, isSpring: true });
                    blocks.push({ x: currentX + 650, y: 200, w: 40, h: 40, type: BLOCK_TYPE.STAR, originalY: 200 });
                    currentX += 800;
                } 
                else if (chunkType === 1) {
                    platforms.push({ x: currentX, y: 550, w: 100, h: 50 });
                    platforms.push({ x: currentX + 200, y: 450, w: 120, h: 20, isMoving: true, startX: currentX + 200, range: 150, speed: 100, dir: 1 });
                    blocks.push({ x: currentX + 250, y: 250, w: 40, h: 40, type: BLOCK_TYPE.FLOWER, originalY: 250 });
                    platforms.push({ x: currentX + 600, y: 550, w: 200, h: 50 });
                    currentX += 800; 
                } 
                else if (chunkType === 2) {
                    // ỐNG NƯỚC & CÂY PIRANHA
                    platforms.push({ x: currentX, y: 550, w: 700, h: 50 });
                    platforms.push({ x: currentX + 200, y: 450, w: 60, h: 100, isPipe: true });
                    piranhas.push({ x: currentX + 210, y: 450, w: 40, h: 50, base_y: 450, timer: Math.random()*100, state: 'hidden' });
                    platforms.push({ x: currentX + 500, y: 400, w: 60, h: 150, isPipe: true });
                    piranhas.push({ x: currentX + 510, y: 400, w: 40, h: 50, base_y: 400, timer: Math.random()*100, state: 'hidden' });
                    enemies.push({ x: currentX + 350, y: 300, w: 30, h: 20, vx: -60 * diff, type: 'bat', baseY: 300 });
                    currentX += 700;
                } 
                else if (chunkType === 3) {
                    platforms.push({ x: currentX, y: 550, w: 600, h: 50 });
                    for(let i=0; i<6; i++) { blocks.push({ x: currentX + 100 + i*40, y: 350, w: 40, h: 40, type: BLOCK_TYPE.COIN, originalY: 350 }); }
                    platforms.push({ x: currentX + 300, y: 450, w: 100, h: 20 }); 
                    enemies.push({ x: currentX + 400, y: 500, w: 24, h: 24, vx: 50 * diff, type: 'goomba' });
                    currentX += 600;
                }
                else {
                    platforms.push({ x: currentX, y: 550, w: 600, h: 50 });
                    platforms.push({ x: currentX + 200, y: 530, w: 60, h: 20, isSpring: true }); 
                    blocks.push({ x: currentX + 210, y: 150, w: 40, h: 40, type: BLOCK_TYPE.MUSHROOM, originalY: 150 }); 
                    enemies.push({ x: currentX + 400, y: 500, w: 24, h: 24, vx: -50, type: 'goomba' });
                    currentX += 600;
                }
            }

            platforms.push({ x: currentX, y: 550, w: WORLD_WIDTH - currentX, h: 50 }); 
            let stairsX = WORLD_WIDTH - 800;
            platforms.push({ x: stairsX, y: 510, w: 40, h: 40 });
            platforms.push({ x: stairsX + 40, y: 470, w: 40, h: 80 });
            platforms.push({ x: stairsX + 80, y: 430, w: 40, h: 120 });
            platforms.push({ x: stairsX + 120, y: 390, w: 40, h: 160 });
            platforms.push({ x: stairsX + 160, y: 350, w: 40, h: 200 });
            goal = { x: WORLD_WIDTH - 400, y: 150, w: 20, h: 400 };

            for(let i=0; i < WORLD_WIDTH / 150; i++) {
                clouds.push({ x: Math.random() * WORLD_WIDTH, y: 30 + Math.random() * 200, w: 60 + Math.random() * 60, h: 30 + Math.random() * 20, speed: 10 + Math.random() * 20 });
            }
        }

        function initGame(isNewLevel) {
            if(!isNewLevel) player.power = 0;
            player.starTimer = 0; setPlayerSize();
            player.x = 50; player.y = 300; player.vx = 0; player.vy = 0; player.jumps = 0;
            buildProceduralLevel(currentLevel);
            currentState = STATE.PLAYING;
        }

        function setPlayerSize() {
            let oldBottom = player.y + player.h;
            if (player.power === 0) { player.w = 24; player.h = 24; } 
            else { player.w = 28; player.h = 48; }
            player.y = oldBottom - player.h;
        }

        // --- 4. HÀM PHỤ TRỢ ---
        function spawnItem(block) {
            if (block.type === BLOCK_TYPE.COIN) {
                coins++; score += 100;
                createParticles(block.x + 20, block.y, '#FFD700', 10);
                floatTexts.push({ x: block.x, y: block.y, text: "+100", life: 1, vy: -50 });
            } else if (block.type === BLOCK_TYPE.MUSHROOM) {
                items.push({ x: block.x, y: block.y - 30, w: 24, h: 24, vx: 100, vy: -200, type: 'mushroom' });
            } else if (block.type === BLOCK_TYPE.FLOWER) {
                items.push({ x: block.x, y: block.y - 30, w: 24, h: 24, vx: 0, vy: 0, type: 'flower' });
            } else if (block.type === BLOCK_TYPE.STAR) {
                items.push({ x: block.x, y: block.y - 30, w: 24, h: 24, vx: 120, vy: -300, type: 'star' });
            }
            block.type = BLOCK_TYPE.EMPTY; block.y -= 10; 
        }

        function shootFireball() {
            if (player.power < 2 || fireballs.length >= 3) return; // Chỉ cho bắn khi có sức mạnh 2 (Hoa Lửa)
            fireballs.push({ x: lastFacingRight ? player.x + player.w : player.x - 12, y: player.y + 10, w: 12, h: 12, vx: lastFacingRight ? 500 : -500, vy: 0, life: 2 });
        }

        function createParticles(x, y, color, count) {
            for (let i = 0; i < count; i++) particles.push({ x: x, y: y, size: Math.random() * 6 + 2, vx: (Math.random() - 0.5) * 200, vy: (Math.random() - 0.5) * 200 - 100, color: color, life: 0.5 + Math.random() * 0.5 });
        }

        function damagePlayer() {
            if (player.invulnTimer > 0 || player.starTimer > 0) return; 
            if (player.power > 0) {
                player.power = 0; setPlayerSize(); player.invulnTimer = 2;
                createParticles(player.x, player.y, '#FFF', 20);
            } else currentState = STATE.GAMEOVER;
        }

        function isColliding(a, b) { return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y; }

        // --- 5. GAME LOOP & VẬT LÝ ---
        let lastTime = 0;
        function gameLoop(timestamp) {
            let dt = (timestamp - lastTime) / 1000;
            if (dt > 0.1) dt = 0.1; lastTime = timestamp;
            update(dt); draw();
            requestAnimationFrame(gameLoop);
        }

        function update(dt) {
            if (currentState !== STATE.PLAYING) {
                if (keys.enter) {
                    if (currentState === STATE.START) initGame(true); 
                    else if (currentState === STATE.LEVEL_COMPLETE) { currentLevel++; if(currentLevel > MAX_LEVEL) currentState = STATE.GAME_CLEAR; else initGame(true); }
                    else if (currentState === STATE.GAMEOVER) initGame(false); 
                    keys.enter = false;
                }
                if (keys.r) {
                    if (currentState === STATE.LEVEL_COMPLETE || currentState === STATE.GAMEOVER) initGame(false); 
                    else if (currentState === STATE.GAME_CLEAR) { currentLevel = 1; score = 0; coins = 0; initGame(true); }
                    keys.r = false;
                }
                return;
            }

            if (player.invulnTimer > 0) player.invulnTimer -= dt;
            if (player.starTimer > 0) player.starTimer -= dt; 

            for(let c of clouds) { c.x -= c.speed * dt; if(c.x + c.w < 0) c.x = WORLD_WIDTH; }
            for(let ft of floatTexts) { ft.y += ft.vy * dt; ft.life -= dt; }
            floatTexts = floatTexts.filter(ft => ft.life > 0);

            for (let p of platforms) {
                if (p.isMoving) {
                    p.x += p.speed * p.dir * dt;
                    if (Math.abs(p.x - p.startX) > p.range) p.dir *= -1;
                }
            }

            let speedMult = player.starTimer > 0 ? 1.4 : 1;
            if (keys.right) player.vx += player.speed * speedMult * dt;
            if (keys.left) player.vx -= player.speed * speedMult * dt;
            player.vx *= Math.pow(player.friction, dt * 60);
            
            let currentMaxSpeed = player.maxSpeed * speedMult;
            if (player.vx > currentMaxSpeed) player.vx = currentMaxSpeed;
            if (player.vx < -currentMaxSpeed) player.vx = -currentMaxSpeed;
            if (Math.abs(player.vx) < 1) player.vx = 0;

            if (!player.isGrounded && player.jumps === 0) player.jumps = 1; 

            if (keys.upJustPressed) {
                if (player.jumps < player.maxJumps) {
                    player.vy = player.jumpPower * (player.starTimer > 0 ? 1.1 : 1);
                    if (player.jumps === 1) createParticles(player.x + player.w / 2, player.y + player.h, '#FFF', 15);
                    player.isGrounded = false; player.jumps++;
                }
                keys.upJustPressed = false; 
            }

            let grav = player.gravity;
            if (player.vy > 0 || (player.vy < 0 && !keys.up)) grav *= player.fallMultiplier;
            player.vy += grav * dt;
            if (player.vy > 1000) player.vy = 1000;

            let allSolids = [...platforms, ...blocks];

            // VA CHẠM
            player.x += player.vx * dt;
            if (player.x < 0) { player.x = 0; player.vx = 0; }
            for (let p of allSolids) {
                if (isColliding(player, p)) {
                    if (player.vx > 0) { player.x = p.x - player.w; player.vx = 0; }
                    else if (player.vx < 0) { player.x = p.x + p.w; player.vx = 0; }
                }
            }

            player.y += player.vy * dt;
            player.isGrounded = false;
            for (let p of allSolids) {
                if (p.originalY && p.y < p.originalY) p.y += 50 * dt; 
                if (isColliding(player, p)) {
                    if (player.vy > 0) { 
                        player.y = p.y - player.h; player.vy = 0; player.isGrounded = true; player.jumps = 0; 
                        if (p.isMoving) player.x += p.speed * p.dir * dt; 
                        if (p.isSpring) { player.vy = player.jumpPower * 1.6; player.isGrounded = false; player.jumps = 1; createParticles(p.x+10, p.y, '#FF69B4', 15); } 
                    } else if (player.vy < 0) { 
                        player.y = p.y + p.h; player.vy = 0;
                        if (blocks.includes(p) && p.type !== BLOCK_TYPE.EMPTY && p.type !== BLOCK_TYPE.SOLID) spawnItem(p);
                    }
                }
            }

            // ITEMS 
            for (let i = items.length - 1; i >= 0; i--) {
                let item = items[i];
                item.vy += 1000 * dt; item.x += item.vx * dt;
                for (let p of allSolids) {
                    if (isColliding(item, p)) {
                        if (item.vx > 0) { item.x = p.x - item.w; item.vx *= -1; } else if (item.vx < 0) { item.x = p.x + p.w; item.vx *= -1; }
                    }
                }
                item.y += item.vy * dt;
                for (let p of allSolids) {
                    if (isColliding(item, p)) { if (item.vy > 0) { item.y = p.y - item.h; item.vy = 0; if (item.type === 'star') item.vy = -350; } }
                }
                
                if (isColliding(player, item)) {
                    if (item.type === 'mushroom' && player.power === 0) { player.power = 1; setPlayerSize(); score += 1000; floatTexts.push({x: player.x, y: player.y, text: "1000", life: 1, vy: -50}); createParticles(player.x, player.y, '#FFF', 20); } 
                    else if (item.type === 'flower') { player.power = 2; setPlayerSize(); score += 1000; floatTexts.push({x: player.x, y: player.y, text: "1000", life: 1, vy: -50}); createParticles(player.x, player.y, '#FFA500', 30); }
                    else if (item.type === 'star') { player.starTimer = 12; score += 2000; floatTexts.push({x: player.x, y: player.y, text: "2000!", life: 1, vy: -50}); } 
                    items.splice(i, 1);
                } else if (item.y > 1000) items.splice(i, 1);
            }

            // ĐẠN LỬA
            for (let i = fireballs.length - 1; i >= 0; i--) {
                let fb = fireballs[i]; fb.life -= dt;
                if (fb.life <= 0) { fireballs.splice(i, 1); continue; }
                fb.vy += 1200 * dt; fb.x += fb.vx * dt; fb.y += fb.vy * dt;
                let hitWall = false;
                for (let p of allSolids) {
                    if (isColliding(fb, p)) {
                        if (fb.y + fb.h / 2 < p.y) { fb.y = p.y - fb.h; fb.vy = -400; } else hitWall = true; 
                    }
                }
                if (hitWall) { createParticles(fb.x, fb.y, '#FFA500', 5); fireballs.splice(i, 1); }
            }

            // KẺ ĐỊCH
            for (let i = enemies.length - 1; i >= 0; i--) {
                let e = enemies[i];
                if(e.type === 'bat') {
                    e.x += e.vx * dt; e.y = e.baseY + Math.sin(Date.now() / 200) * 50;
                } else {
                    e.vy = (e.vy || 0) + 1000 * dt; e.x += e.vx * dt;
                    for (let p of allSolids) {
                        if (isColliding(e, p)) {
                            if (e.vx > 0) { e.x = p.x - e.w; e.vx *= -1; } else if (e.vx < 0) { e.x = p.x + p.w; e.vx *= -1; }
                        }
                    }
                    e.y += e.vy * dt;
                    for (let p of allSolids) { if (isColliding(e, p)) { if (e.vy > 0) { e.y = p.y - e.h; e.vy = 0; } } }
                }

                let killed = false;
                for (let j = fireballs.length - 1; j >= 0; j--) {
                    if (isColliding(e, fireballs[j])) {
                        createParticles(e.x, e.y, '#8B4513', 15); enemies.splice(i, 1); fireballs.splice(j, 1); 
                        score += 200; floatTexts.push({x: e.x, y: e.y, text: "200", life: 1, vy: -50}); killed = true; break; 
                    }
                }
                if(killed) continue;

                if (isColliding(player, e)) {
                    if (player.starTimer > 0) {
                        createParticles(e.x, e.y, '#FFD700', 20); enemies.splice(i, 1); score += 400; floatTexts.push({x: e.x, y: e.y, text: "400!", life: 1, vy: -80});
                    }
                    else if (player.vy > 0 && player.y < e.y) { 
                        player.vy = player.jumpPower * 0.7; createParticles(e.x, e.y + 10, '#8B4513', 10);
                        enemies.splice(i, 1); score += 100; floatTexts.push({x: e.x, y: e.y, text: "100", life: 1, vy: -50});
                    } else damagePlayer();
                }
            }

            // CÂY PIRANHA (Ăn thịt)
            for (let p of piranhas) {
                p.timer -= dt * 60;
                if (p.timer <= 0) {
                    if (p.state === 'hidden') {
                        if (Math.abs(player.x - p.x) > 60) { p.state = 'rising'; p.timer = 30; } else p.timer = 50; 
                    } else if (p.state === 'rising') {
                        p.y -= 100 * dt; if (p.y <= p.base_y - p.h + 5) { p.y = p.base_y - p.h + 5; p.state = 'up'; p.timer = 80; }
                    } else if (p.state === 'up') { p.state = 'falling'; p.timer = 30; } 
                    else if (p.state === 'falling') {
                        p.y += 100 * dt; if (p.y >= p.base_y) { p.y = p.base_y; p.state = 'hidden'; p.timer = 120; }
                    }
                }
                if (p.state !== 'hidden' && isColliding(player, p)) {
                    if(player.starTimer > 0) {
                        createParticles(p.x, p.y, '#FF0000', 30); p.state = 'hidden'; p.y = p.base_y; p.timer = 500; score += 400; floatTexts.push({x: p.x, y: p.y-20, text: "400!", life: 1, vy: -80});
                    } else damagePlayer();
                }
                for (let j = fireballs.length - 1; j >= 0; j--) {
                    if (p.state !== 'hidden' && isColliding(p, fireballs[j])) {
                        createParticles(p.x, p.y, '#FF0000', 20); p.state = 'hidden'; p.y = p.base_y; p.timer = 300; fireballs.splice(j, 1); score += 200; floatTexts.push({x: p.x, y: p.y-20, text: "200", life: 1, vy: -50});
                    }
                }
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i]; p.x += p.vx * dt; p.y += p.vy * dt; p.life -= dt;
                if (p.life <= 0) particles.splice(i, 1);
            }

            if (player.y > 800) currentState = STATE.GAMEOVER;
            if (isColliding(player, goal)) { score += 500; currentState = STATE.LEVEL_COMPLETE; }

            let targetCamX = player.x - canvas.width / 2 + player.w / 2;
            cameraX += (targetCamX - cameraX) * 5 * dt;
            if (cameraX < 0) cameraX = 0;
            if (cameraX > WORLD_WIDTH - canvas.width) cameraX = WORLD_WIDTH - canvas.width;
        }

        // --- 6. RENDER ĐỒ HỌA ---
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if(player.starTimer > 0) {
                let hue = (Date.now() / 10) % 360;
                ctx.fillStyle = `hsl(${hue}, 40%, 30%)`; 
                ctx.fillRect(0,0, canvas.width, canvas.height);
            }

            if (currentState === STATE.PLAYING || currentState === STATE.LEVEL_COMPLETE) {
                ctx.save();
                ctx.translate(-cameraX, 0);

                ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
                for(let c of clouds) {
                    ctx.beginPath(); ctx.arc(c.x, c.y, c.h/2, Math.PI/2, Math.PI*1.5);
                    ctx.arc(c.x + c.w/2, c.y - c.h/4, c.h/1.5, Math.PI, Math.PI*2);
                    ctx.arc(c.x + c.w, c.y, c.h/2, -Math.PI/2, Math.PI/2); ctx.fill();
                }

                ctx.fillStyle = '#000'; ctx.fillRect(goal.x, goal.y, goal.w, goal.h); 
                ctx.fillStyle = '#32CD32'; ctx.fillRect(goal.x - 40, goal.y + 20, 40, 40); 

                for (let p of piranhas) {
                    ctx.fillStyle = '#E52521'; ctx.fillRect(p.x, p.y, p.w, p.h); 
                    ctx.fillStyle = 'white'; ctx.fillRect(p.x + 5, p.y + 5, 5, 10); ctx.fillRect(p.x + 30, p.y + 5, 5, 10);
                }

                for (let p of platforms) {
                    if (p.isPipe) {
                        ctx.fillStyle = '#00A800'; ctx.fillRect(p.x, p.y, p.w, p.h); ctx.fillStyle = '#008000'; ctx.fillRect(p.x - 5, p.y, p.w + 10, 20); 
                    } else if (p.isMoving) {
                        ctx.fillStyle = '#A0522D'; ctx.fillRect(p.x, p.y, p.w, p.h); 
                        ctx.fillStyle = '#FFD700'; ctx.fillRect(p.x, p.y, p.w, 4); 
                    } else if (p.isSpring) {
                        ctx.fillStyle = '#FF1493'; ctx.fillRect(p.x, p.y, p.w, p.h); 
                        ctx.fillStyle = '#FFF'; ctx.fillRect(p.x, p.y + p.h/2 -2, p.w, 4);
                    } else {
                        ctx.fillStyle = '#C84C0C'; ctx.fillRect(p.x, p.y, p.w, p.h); ctx.fillStyle = '#000'; ctx.strokeRect(p.x, p.y, p.w, p.h);
                    }
                }

                for (let b of blocks) {
                    if (b.type === BLOCK_TYPE.EMPTY) ctx.fillStyle = '#888'; 
                    else if (b.type === BLOCK_TYPE.SOLID) ctx.fillStyle = '#C84C0C'; 
                    else ctx.fillStyle = '#F8D820'; 
                    
                    ctx.fillRect(b.x, b.y, b.w, b.h); ctx.fillStyle = '#000'; ctx.strokeRect(b.x, b.y, b.w, b.h);
                    if (b.type !== BLOCK_TYPE.EMPTY && b.type !== BLOCK_TYPE.SOLID) {
                        ctx.fillStyle = '#000'; ctx.font = 'bold 24px Arial'; ctx.fillText('?', b.x + 13, b.y + 28);
                    }
                }

                for (let i of items) {
                    if (i.type === 'mushroom') {
                        ctx.fillStyle = '#E52521'; ctx.fillRect(i.x, i.y, i.w, i.h); ctx.fillStyle = '#FFF'; ctx.fillRect(i.x + 4, i.y + 4, 6, 6); ctx.fillRect(i.x + 14, i.y + 4, 6, 6);
                    } else if (i.type === 'flower') {
                        ctx.fillStyle = '#FFA500'; ctx.fillRect(i.x, i.y, i.w, i.h); ctx.fillStyle = '#FFF'; ctx.fillRect(i.x + 6, i.y + 6, 12, 12);
                    } else if (i.type === 'star') {
                        ctx.fillStyle = `hsl(${(Date.now()/5)%360}, 100%, 50%)`; ctx.fillRect(i.x, i.y, i.w, i.h); 
                    }
                }

                for (let e of enemies) {
                    if(e.type === 'bat') {
                        ctx.fillStyle = '#4B0082'; ctx.fillRect(e.x, e.y, e.w, e.h); 
                        ctx.fillStyle = '#FFF'; ctx.fillRect(e.x-10, e.y+5, 10, 5); ctx.fillRect(e.x+e.w, e.y+5, 10, 5); 
                        ctx.fillStyle = '#F00'; ctx.fillRect(e.x + 6, e.y + 4, 4, 4); 
                    } else {
                        ctx.fillStyle = '#8B4513'; ctx.fillRect(e.x, e.y, e.w, e.h);
                        ctx.fillStyle = '#000'; ctx.fillRect(e.x + 4, e.y + 8, 4, 6); ctx.fillRect(e.x + 16, e.y + 8, 4, 6);
                    }
                }

                for (let fb of fireballs) {
                    ctx.fillStyle = '#FF4500'; ctx.beginPath(); ctx.arc(fb.x + fb.w/2, fb.y + fb.h/2, fb.w/2, 0, Math.PI * 2); ctx.fill();
                }

                for (let p of particles) {
                    ctx.fillStyle = p.color; ctx.globalAlpha = p.life; ctx.fillRect(p.x, p.y, p.size, p.size); ctx.globalAlpha = 1.0;
                }

                ctx.font = 'bold 20px Courier New';
                for(let ft of floatTexts) {
                    ctx.fillStyle = `rgba(255, 255, 255, ${ft.life})`; ctx.fillText(ft.text, ft.x, ft.y);
                }

                // Vẽ Player
                if (player.invulnTimer <= 0 || Math.floor(player.invulnTimer * 10) % 2 === 0) {
                    if (player.starTimer > 0) {
                        ctx.fillStyle = `hsl(${(Date.now()/10)%360}, 100%, 50%)`;
                    } else if (player.power === 2) { ctx.fillStyle = '#FFF'; } 
                    else { ctx.fillStyle = '#E52521'; }
                    
                    ctx.fillRect(player.x, player.y, player.w, player.h);
                    ctx.fillStyle = '#0000FF'; ctx.fillRect(player.x, player.y + player.h/2, player.w, player.h/2);
                    ctx.fillStyle = '#000'; let eyeX = lastFacingRight ? player.x + player.w - 6 : player.x + 2;
                    ctx.fillRect(eyeX, player.y + 4, 4, 4);
                }

                ctx.restore();
            }

            ctx.fillStyle = '#FFF'; ctx.font = 'bold 22px Courier New'; ctx.textAlign = 'left';
            ctx.fillText(`MÀN: ${currentLevel}/${MAX_LEVEL}`, 20, 30);
            ctx.fillText(`ĐIỂM: ${score}`, 20, 60);
            ctx.fillText(`XU: ${coins}`, 20, 90);

            if(player.starTimer > 0) {
                ctx.fillStyle = '#FFD700'; ctx.fillText(`🌟 SUPER MODE: ${Math.ceil(player.starTimer)}s`, 300, 30);
            }

            ctx.textAlign = 'center';
            if (currentState === STATE.START) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.8)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#FFF'; ctx.font = 'bold 40px Courier New'; ctx.fillText('MARIO BROS: ULTIMATE EDITION', canvas.width/2, canvas.height/2 - 40);
                ctx.font = '20px Courier New'; ctx.fillText('Lên = Nhảy (Bấm 2 lần Nhảy Kép) | Z/Shift = Bắn Lửa', canvas.width/2, canvas.height/2 + 10);
                ctx.fillStyle = '#FFD700'; ctx.fillText('Bấm ENTER để Bắt Đầu', canvas.width/2, canvas.height/2 + 70);
            } 
            else if (currentState === STATE.LEVEL_COMPLETE) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#32CD32'; ctx.font = 'bold 45px Courier New'; ctx.fillText(`VƯỢT ẢI ${currentLevel}!`, canvas.width/2, canvas.height/2 - 20);
                ctx.fillStyle = '#FFF'; ctx.font = '22px Courier New'; ctx.fillText(`Nhấn [ENTER] để qua Màn ${currentLevel + 1}`, canvas.width/2, canvas.height/2 + 30);
                ctx.fillStyle = '#AAA'; ctx.font = '18px Courier New'; ctx.fillText(`Nhấn [R] nếu muốn cày lại màn này`, canvas.width/2, canvas.height/2 + 70);
            }
            else if (currentState === STATE.GAMEOVER) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.8)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#FF0000'; ctx.font = 'bold 50px Courier New'; ctx.fillText('GÃY RỒI ĐẠI CA', canvas.width/2, canvas.height/2 - 20);
                ctx.fillStyle = '#FFF'; ctx.font = '20px Courier New'; ctx.fillText('Bấm ENTER hoặc R để Báo Thù', canvas.width/2, canvas.height/2 + 40);
            } 
            else if (currentState === STATE.GAME_CLEAR) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.9)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#FFD700'; ctx.font = 'bold 45px Courier New'; ctx.fillText('CHÚC MỪNG PHÁ ĐẢO!', canvas.width/2, canvas.height/2 - 40);
                ctx.fillStyle = '#FFF'; ctx.font = '22px Courier New'; ctx.fillText(`Tổng Điểm: ${score} - Tổng Xu: ${coins}`, canvas.width/2, canvas.height/2 + 10);
                ctx.fillText('Tuyệt vời! Bấm R để chơi lại.', canvas.width/2, canvas.height/2 + 60);
            }
        }

        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
